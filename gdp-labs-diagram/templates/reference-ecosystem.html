<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GL Runner Within The GDP Labs Ecosystem</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #FFFFFF; width: max-content; height: max-content; overflow: hidden; }
    body {
      font-family: Inter, sans-serif;
      background: #FFFFFF;
      padding: 0;
      color: #1a202c;
      display: inline-block;
    }
    .container { display: inline-block; margin: 0; background: #FFFFFF; }
    .header { margin-bottom: 8px; padding: 10px 8px 0 8px; }
    h1 { font-size: 34px; color: #1a3f6f; font-weight: 700; text-align: center; }
    .subtitle { color: #4a5568; font-size: 15px; text-align: center; margin-top: 6px; }
    .diagram-wrap { background: #ffffff; border: 1px solid #d9e2ec; border-radius: 10px; padding: 8px 8px 4px 8px; }
    svg { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>GL Runner Within The GDP Labs Ecosystem</h1>
      <p class="subtitle">Highest-level dependency view - consumer surfaces through integration and foundation layers</p>
    </div>

    <div class="diagram-wrap">
      <svg width="2240" height="1528" viewBox="0 0 1120 764">
        <defs>
          <marker id="arrBlue" markerWidth="6" markerHeight="4" refX="5.3" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#00A0DF" />
          </marker>
        </defs>

        <rect width="100%" height="100%" fill="#ffffff" />

        <!-- Experience Layer -->
        <rect x="120" y="20" width="760" height="112" rx="0" fill="#E8F5FB" stroke="#00A0DF" stroke-width="2"/>
        <text x="138" y="48" fill="#1A3F6F" font-size="15" font-weight="700">Experience Layer</text>

        <rect x="150" y="74" width="310" height="44" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="305" y="100" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">GLChat</text>

        <rect x="540" y="74" width="310" height="44" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="695" y="100" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Other Apps</text>

        <line x1="305" y1="118" x2="305" y2="146" stroke="#00A0DF" stroke-width="2.4" marker-end="url(#arrBlue)"/>
        <line x1="695" y1="118" x2="695" y2="146" stroke="#00A0DF" stroke-width="2.4" marker-end="url(#arrBlue)"/>

        <!-- Client-side wrappers -->
        <rect x="120" y="148" width="760" height="96" rx="0" fill="#E8EEF4" stroke="#8FA3B1" stroke-width="1.5"/>
        <text x="138" y="176" fill="#1A3F6F" font-size="15" font-weight="700">Client-side wrappers</text>

        <rect x="250" y="194" width="240" height="38" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="370" y="218" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">GL Runner SDK</text>

        <rect x="530" y="194" width="240" height="38" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="650" y="218" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">GL Runner CLI</text>

        <!-- Experience consumers feed into the wrapper layer, not directly into SDK/API nodes -->
        <line x1="305" y1="118" x2="305" y2="148" stroke="#00A0DF" stroke-width="2.4" marker-end="url(#arrBlue)"/>
        <line x1="695" y1="118" x2="695" y2="148" stroke="#00A0DF" stroke-width="2.4" marker-end="url(#arrBlue)"/>
        <line x1="530" y1="213" x2="492" y2="213" stroke="#00A0DF" stroke-width="1.8" marker-end="url(#arrBlue)"/>

        <!-- GL Runner -->
        <rect x="120" y="262" width="760" height="200" rx="0" fill="#EAF2EA" stroke="#4CAF7D" stroke-width="2"/>
        <text x="138" y="274" fill="#1A3F6F" font-size="15" font-weight="700">GL Runner</text>

        <rect x="315" y="292" width="240" height="44" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="435" y="318" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">REST API + SSE</text>

        <rect x="150" y="370" width="350" height="68" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="325" y="398" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">GL Runner Server</text>
        <text x="325" y="420" fill="#ffffff" font-size="12" text-anchor="middle">Control Plane</text>

        <rect x="590" y="370" width="260" height="68" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="720" y="398" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">GL Runner Worker</text>
        <text x="720" y="420" fill="#ffffff" font-size="12" text-anchor="middle">Execution Plane</text>

        <line x1="370" y1="232" x2="370" y2="292" stroke="#00A0DF" stroke-width="2.2" marker-end="url(#arrBlue)"/>
        <line x1="435" y1="336" x2="435" y2="370" stroke="#00A0DF" stroke-width="2" marker-end="url(#arrBlue)"/>
        <line x1="500" y1="404" x2="588" y2="404" stroke="#00A0DF" stroke-width="2" marker-end="url(#arrBlue)"/>

        <line x1="500" y1="462" x2="500" y2="488" stroke="#00A0DF" stroke-width="2" marker-end="url(#arrBlue)"/>

        <!-- Runnables -->
        <rect x="120" y="488" width="760" height="104" rx="0" fill="#FFE9EE" stroke="#E05C7A" stroke-width="2"/>
        <text x="138" y="520" fill="#1A3F6F" font-size="15" font-weight="700">Runnable workloads</text>

        <rect x="150" y="536" width="160" height="44" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="230" y="562" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">AIP Agents</text>

        <rect x="330" y="536" width="190" height="44" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="425" y="562" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Digital Employee</text>

        <rect x="540" y="536" width="170" height="44" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="625" y="562" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">GL Pipeline</text>

        <rect x="730" y="536" width="120" height="44" rx="10" fill="#00A0DF" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="790" y="562" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Deep Research</text>

        <line x1="500" y1="592" x2="500" y2="614" stroke="#00A0DF" stroke-width="2" marker-end="url(#arrBlue)"/>

        <!-- Shared foundation and integration -->
        <rect x="120" y="614" width="760" height="62" rx="0" fill="#F0EBF9" stroke="#7C4DCC" stroke-width="1.5"/>
        <text x="500" y="641" fill="#1A3F6F" font-size="16" font-weight="700" text-anchor="middle">GL Connectors</text>
        <text x="500" y="661" fill="#1A202C" font-size="11" text-anchor="middle">GDP Labs integration boundary for MCP servers, tools, and third-party integrations</text>

        <line x1="500" y1="676" x2="500" y2="696" stroke="#00A0DF" stroke-width="2" marker-end="url(#arrBlue)"/>

        <rect x="120" y="696" width="760" height="62" rx="0" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
        <text x="500" y="723" fill="#1A3F6F" font-size="16" font-weight="700" text-anchor="middle">GL SDK</text>
        <text x="500" y="743" fill="#1A3F6F" font-size="11" text-anchor="middle">Shared GDP Labs SDK / library / tooling foundation used by runnable code and some client/runtime integrations</text>

        <!-- Cross-cutting observability -->
        <rect x="930" y="20" width="70" height="738" rx="0" fill="#F0EBF9" stroke="#7C4DCC" stroke-width="2"/>
        <g transform="translate(965, 389) rotate(90)">
          <text x="0" y="0" fill="#1A3F6F" font-size="15" font-weight="700" text-anchor="middle">GL Observability</text>
          <text x="0" y="18" fill="#4A5568" font-size="11" text-anchor="middle">Traces, metrics, logs - complements canonical runs</text>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
