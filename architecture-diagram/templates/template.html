<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROJECT NAME] Architecture Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #FFFFFF;
      padding: 2rem;
      color: #1A202C;
      width: max-content;
    }

    .diagram-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1A202C;
      margin-bottom: 0.25rem;
    }

    .diagram-subtitle {
      font-size: 0.8rem;
      color: #8FA3B1;
      margin-bottom: 1.5rem;
    }

    /* ── GDP Labs 5-Group Color System ── */
    /* Blue:    fill #E8F5FB  border #00A0DF  — primary active components */
    /* Green:   fill #EAF2EA  border #4CAF7D  — product boundaries */
    /* Amber:   fill #FFF3E0  border #F5A623  — surface/helper steps */
    /* Purple:  fill #F0EBF9  border #7C4DCC  — supporting/integration */
    /* Rose:    fill #FFE9EE  border #E05C7A  — runnable/workload layers */
    /* Gray:    fill #E8EEF4  border #8FA3B1  — stores / neutral support */

    svg {
      display: block;
    }

    /* ── Typography ── */
    .node-title {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
    }
    .node-subtitle {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-size: 10px;
      font-weight: 400;
    }
    .container-label {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
    }
    .legend-text {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-size: 11px;
      font-weight: 400;
    }

    /* ── Connector Lines ── */
    /* Solid Sky Blue 2pt = primary forward flow */
    /* Dashed Navy Dark 1.5pt = feedback/retry loop */
    /* Dashed Mid Gray 1.2pt = optional/info */
    /* Solid Pink 2pt = error/reject path */
    /* Dot-dash Sky Blue 1.2pt = async/event-triggered */

    /* ── Dashed Box Semantics ── */
    /* Mid Gray dashed = planned/future */
    /* Navy Dark dashed = expandable/has sub-diagram */
    /* Mid Gray dot-dash = out of scope */
    /* Pink dashed = error/failure zone */
  </style>
</head>
<body>

  <!-- Diagram Title -->
  <div class="diagram-title">[Project Name] — [View Name]</div>
  <div class="diagram-subtitle">[One-line description of what this diagram shows]</div>

  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" width="1200" height="800">

    <!-- ══════════════════════════════════════════ -->
    <!-- LEGEND (top right)                        -->
    <!-- ══════════════════════════════════════════ -->
    <g transform="translate(900, 20)">
      <rect x="0" y="0" width="280" height="140" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <text x="16" y="22" class="container-label" fill="#1A202C">Legend</text>

      <!-- Blue group -->
      <rect x="16" y="34" width="40" height="20" rx="4" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="64" y="48" class="legend-text" fill="#1A202C">Component</text>

      <!-- Green group -->
      <rect x="16" y="60" width="40" height="20" rx="4" fill="#EAF2EA" stroke="#4CAF7D" stroke-width="1.5"/>
      <text x="64" y="74" class="legend-text" fill="#1A202C">Boundary</text>

      <!-- Purple group -->
      <rect x="16" y="86" width="40" height="20" rx="4" fill="#F0EBF9" stroke="#7C4DCC" stroke-width="1.5"/>
      <text x="64" y="100" class="legend-text" fill="#1A202C">Supporting</text>

      <!-- Gray group -->
      <rect x="160" y="34" width="40" height="20" rx="4" fill="#E8EEF4" stroke="#8FA3B1" stroke-width="1.5"/>
      <text x="208" y="48" class="legend-text" fill="#1A202C">Store</text>

      <!-- Rose group -->
      <rect x="160" y="60" width="40" height="20" rx="4" fill="#FFE9EE" stroke="#E05C7A" stroke-width="1.5"/>
      <text x="208" y="74" class="legend-text" fill="#1A202C">Workload</text>

      <!-- Dashed = future/planned -->
      <rect x="160" y="86" width="40" height="20" rx="4" fill="#FFFFFF" stroke="#8FA3B1" stroke-width="1.5" stroke-dasharray="4,4"/>
      <text x="208" y="100" class="legend-text" fill="#1A202C">Future</text>

      <!-- Line styles -->
      <line x1="16" y1="120" x2="56" y2="120" stroke="#00A0DF" stroke-width="2"/>
      <text x="64" y="124" class="legend-text" fill="#1A202C">Primary flow</text>

      <line x1="160" y1="120" x2="200" y2="120" stroke="#1A3F6F" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="208" y="124" class="legend-text" fill="#1A202C">Feedback loop</text>
    </g>

    <!-- ══════════════════════════════════════════ -->
    <!-- CONTAINER: [Layer Name]                   -->
    <!-- ══════════════════════════════════════════ -->
    <g>
      <!-- Container boundary (solid fill, colored border) -->
      <rect x="40" y="40" width="1120" height="160" rx="8" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="56" y="62" class="container-label" fill="#1A202C">Layer Name — Description</text>

      <!-- Node A (Blue group) -->
      <rect x="60" y="80" width="200" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="160" y="114" class="node-title" fill="#1A202C" text-anchor="middle">Node A</text>
      <text x="160" y="132" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Role description</text>

      <!-- Node B (Blue group) -->
      <rect x="300" y="80" width="200" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="400" y="114" class="node-title" fill="#1A202C" text-anchor="middle">Node B</text>
      <text x="400" y="132" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Role description</text>

      <!-- Node C — Future (dashed border) -->
      <rect x="540" y="80" width="200" height="80" rx="6" fill="#FFFFFF" stroke="#8FA3B1" stroke-width="1.5" stroke-dasharray="4,4"/>
      <text x="640" y="114" class="node-title" fill="#1A202C" text-anchor="middle">Node C</text>
      <text x="640" y="132" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">later surface</text>
    </g>

    <!-- ══════════════════════════════════════════ -->
    <!-- CONTAINER: [Second Layer]                 -->
    <!-- ══════════════════════════════════════════ -->
    <g>
      <rect x="40" y="240" width="820" height="160" rx="8" fill="#EAF2EA" stroke="#4CAF7D" stroke-width="1.5"/>
      <text x="56" y="262" class="container-label" fill="#1A3F6F">Product Boundary — Control Plane</text>

      <!-- Nodes inside... -->
      <rect x="60" y="280" width="180" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="150" y="314" class="node-title" fill="#1A202C" text-anchor="middle">Control Plane API</text>
      <text x="150" y="332" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Admission, auth, contract</text>

      <rect x="280" y="280" width="180" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="370" y="314" class="node-title" fill="#1A202C" text-anchor="middle">Scheduler</text>
      <text x="370" y="332" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Schedule intent + reconcile</text>

      <rect x="500" y="280" width="180" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="590" y="314" class="node-title" fill="#1A202C" text-anchor="middle">OrchestrationBackend</text>
      <text x="590" y="332" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Coordination and assignment</text>
    </g>

    <!-- ══════════════════════════════════════════ -->
    <!-- STORAGE LAYER (between boundaries)        -->
    <!-- ══════════════════════════════════════════ -->
    <g>
      <rect x="40" y="440" width="300" height="80" rx="6" fill="#E8EEF4" stroke="#8FA3B1" stroke-width="1.5"/>
      <text x="190" y="472" class="node-title" fill="#1A202C" text-anchor="middle">ControlPlaneStore</text>
      <text x="190" y="492" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Canonical metadata, runs</text>

      <rect x="380" y="440" width="300" height="80" rx="6" fill="#E8EEF4" stroke="#8FA3B1" stroke-width="1.5"/>
      <text x="530" y="472" class="node-title" fill="#1A202C" text-anchor="middle">ArtifactStore</text>
      <text x="530" y="492" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Deployed bundles and artifacts</text>
    </g>

    <!-- ══════════════════════════════════════════ -->
    <!-- CONTAINER: [Third Layer — Workload]       -->
    <!-- ══════════════════════════════════════════ -->
    <g>
      <rect x="40" y="560" width="820" height="160" rx="8" fill="#FFE9EE" stroke="#E05C7A" stroke-width="1.5"/>
      <text x="56" y="582" class="container-label" fill="#1A202C">Execution Plane — Worker</text>

      <rect x="60" y="600" width="180" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="150" y="634" class="node-title" fill="#1A202C" text-anchor="middle">WorkerHost</text>
      <text x="150" y="652" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Accept assignments</text>

      <rect x="280" y="600" width="180" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="370" y="634" class="node-title" fill="#1A202C" text-anchor="middle">ExecutionRuntime</text>
      <text x="370" y="652" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Load and execute logic</text>

      <rect x="500" y="600" width="180" height="80" rx="6" fill="#E8F5FB" stroke="#00A0DF" stroke-width="1.5"/>
      <text x="590" y="634" class="node-title" fill="#1A202C" text-anchor="middle">EventPublisher</text>
      <text x="590" y="652" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Publish events and status</text>
    </g>

    <!-- ══════════════════════════════════════════ -->
    <!-- SUPPORTING (Purple group)                 -->
    <!-- ══════════════════════════════════════════ -->
    <g>
      <rect x="900" y="560" width="260" height="80" rx="6" fill="#F0EBF9" stroke="#7C4DCC" stroke-width="1.5"/>
      <text x="1030" y="594" class="node-title" fill="#1A202C" text-anchor="middle">GL Connectors</text>
      <text x="1030" y="612" class="node-subtitle" fill="#8FA3B1" text-anchor="middle">Integration boundary</text>
    </g>

    <!-- ══════════════════════════════════════════ -->
    <!-- ARROWS (drawn BEFORE boxes so they sit    -->
    <!-- behind — but in this template they're     -->
    <!-- here for readability; move up if needed)  -->
    <!-- ══════════════════════════════════════════ -->

    <!-- Primary flow: solid Sky Blue 2pt -->
    <defs>
      <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#00A0DF"/>
      </marker>
      <marker id="ah-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#8FA3B1"/>
      </marker>
      <marker id="ah-navy" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#1A3F6F"/>
      </marker>
    </defs>

    <!-- Example: Node A → Node B -->
    <line x1="260" y1="120" x2="300" y2="120" stroke="#00A0DF" stroke-width="2" marker-end="url(#ah-blue)"/>

    <!-- Example: Control Plane API → Scheduler -->
    <line x1="240" y1="320" x2="280" y2="320" stroke="#00A0DF" stroke-width="2" marker-end="url(#ah-blue)"/>

    <!-- Example: feedback loop (dashed Navy Dark) -->
    <line x1="590" y1="600" x2="590" y2="440" stroke="#1A3F6F" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah-navy)"/>
    <text x="600" y="520" class="node-subtitle" fill="#1A3F6F">events</text>

    <!-- Example: optional/info (dashed Mid Gray) -->
    <line x1="780" y1="640" x2="900" y2="600" stroke="#8FA3B1" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#ah-gray)"/>

  </svg>

</body>
</html>
